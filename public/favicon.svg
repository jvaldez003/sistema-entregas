<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a9e"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Pantalla/monitor -->
  <rect x="10" y="12" width="44" height="28" rx="4" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Pie del monitor -->
  <line x1="32" y1="40" x2="32" y2="48" stroke="white" stroke-width="2.5"/>
  <line x1="22" y1="48" x2="42" y2="48" stroke="white" stroke-width="2.5"/>
  <!-- Check dentro de pantalla -->
  <polyline points="20,26 28,34 44,18" fill="none" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
